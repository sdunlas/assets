<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6247a6"/>
      <stop offset="0.55" stop-color="#4b3579"/>
      <stop offset="1" stop-color="#2b1d47"/>
    </linearGradient>
    <linearGradient id="head2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6c9f5"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c2a63"/>
      <stop offset="1" stop-color="#221537"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="256" fill="url(#bg2)"/>

  <!-- antenna -->
  <path d="M256 148 V108" stroke="#c9b8f2" stroke-width="18" stroke-linecap="round"/>
  <circle cx="256" cy="88" r="26" fill="#f0c04a"/>

  <!-- ears -->
  <rect x="100" y="248" width="32" height="76" rx="16" fill="#b9a3ee"/>
  <rect x="380" y="248" width="32" height="76" rx="16" fill="#b9a3ee"/>

  <!-- head -->
  <rect x="126" y="148" width="260" height="240" rx="76" fill="url(#head2)"/>

  <!-- visor -->
  <rect x="164" y="212" width="184" height="112" rx="56" fill="url(#visor)"/>
  <circle cx="212" cy="268" r="19" fill="#f0c04a"/>
  <circle cx="300" cy="268" r="19" fill="#f0c04a"/>
</svg>
